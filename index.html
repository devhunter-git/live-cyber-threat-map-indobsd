<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev'Hunter Security - Monitoring Portal</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .portal {
            border: 2px solid #00ff00;
            padding: 50px;
            background: rgba(0, 255, 0, 0.02);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 { font-size: 22px; letter-spacing: 3px; margin-bottom: 40px; }
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .btn {
            border: 1px solid #00ff00;
            padding: 20px;
            text-decoration: none;
            color: #00ff00;
            font-weight: bold;
            transition: all 0.3s ease;
            display: block;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }
        .status { margin-top: 40px; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="portal">
    <h1>DEV'HUNTER SECURITY MONITORING</h1>
    <div class="links">
        <a href="https://ctmap.indobsd.id/" target="_blank" class="btn">
            🛡️ LIVE THREAT MAP<br>
            <span style="font-size: 9px; font-weight: normal;">Cyber Intelligence</span>
        </a>
        <a href="https://shieldscan.indobsd.id/" target="_blank" class="btn">
            🔍 SHIELD SCAN<br>
            <span style="font-size: 9px; font-weight: normal;">Security Audit</span>
        </a>
    </div>
    <div class="status">GATEWAY: OPERATIONAL | ENCRYPTION: ACTIVE</div>
</div>

</body>
</html>
