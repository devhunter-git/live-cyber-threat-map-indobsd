<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard - Dev'Hunter Security</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        iframe { position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); border: none; }
        
        .nav-bar {
            height: 40px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 2px solid #00ff00;
        }

        .nav-btn {
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 15px;
            margin-right: 10px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .nav-btn:hover { background: #00ff00; color: #000; }
        .active { background: #00ff00; color: #000; }
    </style>
</head>
<body>

<div class="nav-bar">
    <button class="nav-btn active" onclick="showPage('https://ctmap.indobsd.id/', this)">Live Threat Map</button>
    <button class="nav-btn" onclick="showPage('https://shieldscan.indobsd.id/', this)">ShieldScan (Security Audit)</button>
</div>

<iframe id="main-frame" src="https://ctmap.indobsd.id/"></iframe>

<script>
    function showPage(url, btn) {
        document.getElementById('main-frame').src = url;
        let btns = document.getElementsByClassName('nav-btn');
        for (let i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
        btn.classList.add('active');
    }
</script>

</body>
</html>
